name: Build installers

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      version:
        description: 'Version, e.g. v1.0.0 (test build; not attached to a release)'
        required: true
        default: 'v0.0.0-test'

permissions:
  contents: write

jobs:
  # --------------------------------------------------------------- Windows ---
  windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          raw="${GITHUB_REF_NAME}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && raw="${{ github.event.inputs.version }}"
          echo "v=${raw#v}" >> "$GITHUB_OUTPUT"

      - name: Stage payload (tracked source only)
        shell: bash
        run: |
          mkdir -p payload
          git archive --format=tar HEAD | tar -x -C payload

      - name: Install Inno Setup
        run: choco install innosetup --no-progress -y

      - name: Build installer
        shell: pwsh
        run: |
          & "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe" `
            "/DMyAppVersion=${{ steps.ver.outputs.v }}" `
            packaging\windows\installer.iss

      - uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: dist/*.exe

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.exe

  # ----------------------------------------------------------------- macOS ---
  macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          raw="${GITHUB_REF_NAME}"
          [ "${{ github.event_name }}" = "workflow_dispatch" ] && raw="${{ github.event.inputs.version }}"
          echo "v=${raw#v}" >> "$GITHUB_OUTPUT"

      - name: Build .dmg
        run: bash packaging/macos/build_dmg.sh "${{ steps.ver.outputs.v }}"

      - uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: dist/*.dmg

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.dmg
